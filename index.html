<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.5">
    <title>MedYG | Tu Base de Datos Interactiva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animated-bg {
            background: linear-gradient(-45deg, #09090b, #1e3a8a, #064e3b, #09090b);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        .category-pill {
            @apply px-5 py-2 rounded-full border border-zinc-800 bg-zinc-900/50 text-sm text-zinc-400 transition hover:bg-zinc-800 hover:text-white;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans flex overflow-hidden">

   <!-- SIDEBAR IZQUIERDA -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 transition-transform -translate-x-full md:relative md:translate-x-0"
        <!-- Icono de Inicio / Dashboard -->
        <div class="px-6 mb-10 flex items-center gap-3 text-blue-500">
            <div class="p-2 border border-blue-500/30 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
            </div>
            <span class="font-bold text-lg text-white">Menú</span>
        </div>

        <!-- Navegación por Ramos -->
        <nav class="flex flex-col px-4 gap-2">
            <!-- Fisiología -->
            <a href="https://YordanG15.github.io/Fisiologia/" class="flex items-center gap-4 p-3 rounded-xl hover:bg-zinc-800 transition text-zinc-400 hover:text-red-500 group">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                <span class="font-medium group-hover:text-white">Fisiología</span>
            </a>

            <!-- Bioquímica -->
            <a href="https://YordanG15.github.io/bioquimica/" class="flex items-center gap-4 p-3 rounded-xl hover:bg-zinc-800 transition text-zinc-400 hover:text-emerald-500 group">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m8 3 4 8 5-5 5 15H2L8 3z"/></svg>
                <span class="font-medium group-hover:text-white">Bioquímica</span>
            </a>

            <!-- Anatomía -->
            <a href="#" class="flex items-center gap-4 p-3 rounded-xl hover:bg-zinc-800 transition text-zinc-400 hover:text-orange-400 group">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="m7 7 10 10"/><path d="m17 7-10 10"/></svg>
                <span class="font-medium group-hover:text-white">Anatomía</span>
            </a>

            <!-- Inmunología -->
            <a href="https://YordanG15.github.io/inmunologia/" class="flex items-center gap-4 p-3 rounded-xl hover:bg-zinc-800 transition text-zinc-400 hover:text-blue-400 group">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="flex-1 h-screen overflow-y-auto flex flex-col">
        <header class="w-full bg-zinc-950/80 backdrop-blur-md border-b border-zinc-900 sticky top-0 z-50">
            <button onclick="toggleSidebar()" class="md:hidden p-2 text-zinc-400">
  <!-- Icono de 4 cuadritos o hamburguesa -->
</button>
            <nav class="w-full px-6 py-4">
                <a href="#" class="text-2xl font-bold tracking-tighter">
                    <span class="font-light text-zinc-400">Med</span>YG
                </a>
            </nav>
        </header>

        <main class="flex-grow">
            <!-- Sección de Bienvenida -->
            <section class="animated-bg py-24 border-b border-zinc-800">
                <div class="w-full px-6 text-center">
                    <h1 class="text-5xl md:text-7xl font-bold tracking-tighter mb-6">
                        Domina la medicina de forma interactiva.
                    </h1>
                    <p class="text-zinc-400 text-lg mb-12 max-w-2xl mx-auto">

                    </p>
                </div>
            </section>
        </main>

        <!-- PIE DE PÁGINA -->
        <footer class="py-12 border-t border-zinc-900 text-center text-zinc-600 text-sm">
            <p>&copy; 2026 MedYG - Desarrollado por Yordan Garcés</p>
        </footer>
    </div>
        <script>
        function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('-translate-x-full');
}
        </script>
</body>
</html>
